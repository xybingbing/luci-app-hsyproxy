name: Build ipk for HomeProxy

on:
  workflow_dispatch:
    inputs:
      pkg_type:
        description: 'Package type to build'
        required: true
        default: 'ipk'
        type: choice
        options:
          - 'ipk'
          - 'apk'
          - 'both'
      release_type:
        description: 'Release type'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - 'snapshot'
          - 'release'
  push:
    branches:
      - 'master'
      - 'dev'
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - 'master'
      - 'dev'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'htdocs/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Build ipk file
        env:
          PKG_TYPE: ${{ github.event.inputs.pkg_type || 'both' }}
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'snapshot' }}
        run: |
          cd .github
          if [ "$PKG_TYPE" = "both" ] || [ "$PKG_TYPE" = "apk" ]; then
            fakeroot bash build-ipk.sh apk "$RELEASE_TYPE"
          fi
          if [ "$PKG_TYPE" = "both" ] || [ "$PKG_TYPE" = "ipk" ]; then
            fakeroot bash build-ipk.sh ipk "$RELEASE_TYPE"
          fi
          echo "APK_ASSET_NAME=$(ls *.apk 2>/dev/null || echo '')" >> $GITHUB_ENV
          echo "IPK_ASSET_NAME=$(ls *.ipk 2>/dev/null || echo '')" >> $GITHUB_ENV
        shell: bash

      - name: Publishing APK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release' && env.APK_ASSET_NAME != ''
        with:
          name: ${{ env.APK_ASSET_NAME }}
          path: .github/${{ env.APK_ASSET_NAME }}
          retention-days: 7
          archive: false

      - name: Publishing IPK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release' && env.IPK_ASSET_NAME != ''
        with:
          name: ${{ env.IPK_ASSET_NAME }}
          path: .github/${{ env.IPK_ASSET_NAME }}
          retention-days: 7
          archive: false

      - name: Publishing to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ github.token }}
          file: .github/luci-app-homeproxy_*.*
          file_glob: true
          tag: ${{ github.ref }}
