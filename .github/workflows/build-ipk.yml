name: Build ipk for HomeProxy

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - 'snapshot'
          - 'release'
      upload_release:
        description: 'Upload to GitHub Release'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - 'master'
      - 'dev'
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - 'master'
      - 'dev'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'htdocs/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot lua5.1

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Build ipk file
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'snapshot' }}
        run: |
          cd .github
          fakeroot bash build-ipk.sh "$RELEASE_TYPE"
          echo "IPK_ASSET_NAME=$(ls *.ipk 2>/dev/null || echo '')" >> $GITHUB_ENV
        shell: bash

      - name: Publishing IPK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release' && env.IPK_ASSET_NAME != ''
        with:
          name: ${{ env.IPK_ASSET_NAME }}
          path: .github/${{ env.IPK_ASSET_NAME }}
          retention-days: 7
          archive: false

      - name: Publishing to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: (github.event_name == 'release') || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_release == 'true')
        with:
          repo_token: ${{ github.token }}
          file: .github/luci-app-homeproxy_*.*
          file_glob: true
          tag: ${{ github.event.inputs.release_type == 'release' && github.ref_name || 'snapshot' }}
